<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Makanan Lezat</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff8f0;
    }
    header {
      background: #ff6b35;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    button {
      background: #ff6b35;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Makanan Lezat Nusantara</h1>
  <p>Pesan makanan favoritmu sekarang!</p>
</header>

<section class="menu">
  <div class="card">
    <h3>Nasi Goreng</h3>
    <p>Rp 20.000</p>
    <button>Beli</button>
  </div>

  <div class="card">
    <h3>Mie Ayam</h3>
    <p>Rp 15.000</p>
    <button>Beli</button>
  </div>

  <div class="card">
    <h3>Sate Ayam</h3>
    <p>Rp 25.000</p>
    <button>Beli</button>
  </div>
</section>

</body>
</html>
